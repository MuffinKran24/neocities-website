<html>
  <head>
    <meta charset="UTF-8">
    <title>Muffin/Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <h1>Calculator</h1>

    <p>found an simple, old calculator lying around</p>

    <div class="calc">
      <input type="text" id="display" disabled>
      <div class"buttons">
                       
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button><br>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button><br>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button><br>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button><br>
        
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        <button class="operator" onclick="appendToDisplay('/')">/</button><br>
        
        <button class="equals" onclick="calculate()">=</button>    
        <button class="clear" onclick="clearDisplay()">C</button>
      </div>
    </div>
      
    <script>
      const display = document.getElementById('display');

      function appendToDisplay(input) {
        display.value += input;
      }

      function clearDisplay() {
        display.value = "";
      }

      function calculate() {
        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
            setTimeout(clearDisplay, 1500);
        }
      }
    </script>

    <div class="back">
      <a href="index.html">back</a>
    </div>
  </body>
</html>
